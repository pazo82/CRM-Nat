name: Render Mermaid diagrams

on:
  push:
    paths:
      - '**/*.mermaid'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Render each .mermaid file via Kroki
        run: |
          set -e
          for f in $(find . -name '*.mermaid'); do
            svg="${f%.mermaid}.svg"
            echo "Rendering $f -> $svg"
            curl -sf -X POST https://kroki.io/mermaid/svg \
              -H "Content-Type: text/plain" \
              --data-binary @"$f" \
              -o "$svg"
          done

      - name: Commit generated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '*.svg'
          if git diff --staged --quiet; then
            echo "Nessuna modifica agli SVG generati."
          else
            git commit -m "Rigenera diagrammi SVG da .mermaid [skip ci]"
            git push
          fi
