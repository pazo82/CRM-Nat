<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualizzatore diagramma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #12141a;
    --ink: #e8e6df;
    --muted: #8b8f9b;
    --line: #2a2e38;
    --accent: #5eead4;
    --error: #e07a5f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  main { max-width: 1400px; margin: 0 auto; padding: 32px 24px 96px; }
  nav { margin-bottom: 24px; }
  nav a {
    color: var(--muted);
    text-decoration: none;
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.85rem;
  }
  nav a:hover, nav a:focus-visible { color: var(--accent); }
  h1 {
    font-family: "IBM Plex Mono", monospace;
    font-weight: 500;
    font-size: 1rem;
    color: var(--muted);
    margin: 0 0 24px;
    word-break: break-all;
  }
  .frame {
    background: #ffffff;
    border-radius: 8px;
    padding: 32px;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .frame img { display: block; width: 100%; height: auto; }
  .status {
    color: var(--muted);
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.9rem;
  }
  .status.error { color: var(--error); }
</style>
</head>
<body>
<main>
  <nav><a href="index.html">← Catalogo</a></nav>
  <h1 id="filename">—</h1>
  <div class="frame" id="frame">
    <p class="status" id="status">Caricamento…</p>
  </div>
</main>

<script>
  const src = new URLSearchParams(window.location.search).get('src');
  const frame = document.getElementById('frame');
  const status = document.getElementById('status');
  const filenameEl = document.getElementById('filename');

  if (!src) {
    status.classList.add('error');
    status.textContent = 'Parametro ?src= mancante nell\'URL.';
  } else {
    filenameEl.textContent = src;
    const img = new Image();
    img.alt = src;
    img.onload = () => {
      frame.innerHTML = '';
      frame.appendChild(img);
    };
    img.onerror = () => {
      status.classList.add('error');
      status.textContent = `Immagine non trovata: ${src}`;
    };
    img.src = src;
  }
</script>
</body>
</html>
