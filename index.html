<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalogo materiali</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #12141a;
    --surface: #1c1f27;
    --ink: #e8e6df;
    --muted: #8b8f9b;
    --line: #2a2e38;
    --accent-html: #e0a458;
    --accent-mermaid: #5eead4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.5;
  }
  main { max-width: 720px; margin: 0 auto; padding: 64px 24px 96px; }
  header { margin-bottom: 48px; }
  h1 {
    font-family: "Space Grotesk", sans-serif;
    font-size: 2rem;
    font-weight: 700;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }
  .sub { color: var(--muted); margin: 0; font-size: 0.95rem; }
  #list { display: flex; flex-direction: column; gap: 12px; }
  .card {
    display: block;
    background: var(--surface);
    border: 1px solid var(--line);
    border-left: 3px solid var(--type-color, var(--muted));
    border-radius: 6px;
    padding: 16px 20px;
    text-decoration: none;
    color: var(--ink);
    transition: border-color 0.15s ease, transform 0.15s ease;
  }
  .card:hover, .card:focus-visible {
    border-color: var(--type-color, var(--muted));
    transform: translateX(2px);
  }
  .card:focus-visible { outline: 2px solid var(--type-color, var(--ink)); outline-offset: 2px; }
  .card-top { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
  .title {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 500;
    font-size: 1.05rem;
  }
  .badge {
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--type-color, var(--muted));
    white-space: nowrap;
  }
  .path {
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 6px;
  }
  .empty, .error {
    color: var(--muted);
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.9rem;
  }
  @media (prefers-reduced-motion: reduce) {
    .card { transition: none; }
  }
</style>
</head>
<body>
<main>
  <header>
    <h1>Catalogo materiali</h1>
    <p class="sub">Elenco dei documenti e diagrammi del progetto, generato da <code>catalog.json</code>.</p>
  </header>
  <div id="list" class="empty">Caricamento…</div>
</main>

<script>
  const typeColor = { html: 'var(--accent-html)', mermaid: 'var(--accent-mermaid)' };
  const typeLabel = { html: 'HTML', mermaid: 'MERMAID' };

  fetch('catalog.json')
    .then(res => {
      if (!res.ok) throw new Error(`catalog.json non trovato (${res.status})`);
      return res.json();
    })
    .then(items => {
      const list = document.getElementById('list');
      list.classList.remove('empty');

      if (!Array.isArray(items) || items.length === 0) {
        list.classList.add('empty');
        list.textContent = 'Nessun materiale ancora presente nel catalogo.';
        return;
      }

      list.innerHTML = '';
      items.forEach(item => {
        const a = document.createElement('a');
        a.className = 'card';
        a.style.setProperty('--type-color', typeColor[item.type] || 'var(--muted)');
        a.href = item.type === 'mermaid'
          ? `viewer.html?src=${encodeURIComponent(item.path)}`
          : item.path;

        const top = document.createElement('div');
        top.className = 'card-top';

        const title = document.createElement('span');
        title.className = 'title';
        title.textContent = item.title || item.path;

        const badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = typeLabel[item.type] || item.type;

        top.appendChild(title);
        top.appendChild(badge);

        const path = document.createElement('div');
        path.className = 'path';
        path.textContent = item.path;

        a.appendChild(top);
        a.appendChild(path);
        list.appendChild(a);
      });
    })
    .catch(err => {
      const list = document.getElementById('list');
      list.className = 'error';
      list.textContent = `Errore nel caricamento del catalogo: ${err.message}`;
    });
</script>
</body>
</html>
